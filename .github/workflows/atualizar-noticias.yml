name: Atualizar notícias filtradas

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 deep-translator

      - name: Rodar script de monitoramento
        run: python monitor_noticias.py

      - name: Publicar mudanças (docs/noticias.json)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/noticias.json
          git diff --quiet --cached || git commit -m "Atualiza noticias.json [automático]"
          git push
